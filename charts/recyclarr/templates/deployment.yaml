apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 1000
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: recyclarr
          image: "recyclarr/recyclarr:{{ .Chart.AppVersion }}"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: quality-config
              mountPath: /config/configs
            - name: api-keys
              mountPath: /run/secrets/recyclarr
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-config
        - name: quality-config
          configMap:
            name: {{ .Release.Name }}-quality-config
        - name: api-keys
          secret:
            secretName: {{ required "existingSecret is required" .Values.existingSecret | quote }}
