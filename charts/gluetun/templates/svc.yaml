apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: LoadBalancer
  ports:
    - name: tcp-httpproxy
      port: 8080
      targetPort: 8888
      protocol: TCP
    - name: tcp-shadowsocks
      port: 8388
      targetPort: 8388
      protocol: TCP
    - name: udp-shadowsocks
      port: 8388
      targetPort: 8388
      protocol: UDP
  selector:
    app: {{ .Release.Name }}