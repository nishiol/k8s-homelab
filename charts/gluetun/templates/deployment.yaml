apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: gluetun
          image: "qmcgaw/gluetun:{{ .Chart.AppVersion }}"
          ports:
            - name: tcp-httpproxy
              containerPort: 8888
              protocol: TCP
            - name: udp-shadowsocks
              containerPort: 8388
              protocol: UDP
            - name: tcp-shadowsocks
              containerPort: 8388
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: SHADOWSOCKS
              value: "on"
            - name: SHADOWSOCKS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "existingSecret is required" .Values.existingSecret | quote }}
                  key: password
            - name: SHADOWSOCKS_CIPHER
              value: "chacha20-ietf-poly1305"
            - name: HTTPPROXY
              value: "on"
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: VPN_TYPE
              value: "wireguard"
            - name: VPN_ENDPOINT_IP
              value: "{{ .Values.wireguard.endpoint }}"
            - name: VPN_ENDPOINT_PORT
              value: "{{ .Values.wireguard.port }}"
            - name: BLOCK_MALICIOUS
              value: "off"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "10.43.0.0/16,2001:cafe:43::/112" # https://docs.k3s.io/cli/server#networking
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "existingSecret is required" .Values.existingSecret | quote }}
                  key: privateKey
            - name: WIREGUARD_ADDRESSES
              value: "{{ .Values.wireguard.addresses }}"
            - name: WIREGUARD_PUBLIC_KEY
              value: "{{ .Values.wireguard.publicKey }}"
            - name: WIREGUARD_MTU
              value: "{{ .Values.wireguard.mtu }}"
            - name: WIREGUARD_ALLOWED_IPS
              value: "{{ .Values.wireguard.allowedIps }}"
