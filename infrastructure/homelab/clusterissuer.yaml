apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clusterissuer
  namespace: default
spec:
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  interval: 30m
  releaseName: clusterissuer
  targetNamespace: default
  storageNamespace: default
  chart:
    spec:
      chart: ./charts/clusterissuer
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    email: schitikov.ol@gmail.com
