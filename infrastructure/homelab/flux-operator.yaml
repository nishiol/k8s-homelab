apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cert-manager-http01
  namespace: flux-system
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 8089
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-flux-web
  namespace: flux-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: flux-operator
      app.kubernetes.io/name: flux-operator
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: traefik-kube-system
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 9080
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: flux-operator-basic-auth
  namespace: flux-system
spec:
  basicAuth:
    secret: flux-operator-auth
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-web-basic-auth-admins
subjects:
  - kind: Group
    name: flux-web-basic-auth-admins
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: flux-web-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  dependsOn:
    - name: clusterissuer
      namespace: default
  interval: 30m
  releaseName: flux-operator
  targetNamespace: flux-system
  storageNamespace: flux-system
  chart:
    spec:
      chart: flux-operator
      version: 0.54.1
      sourceRef:
        kind: HelmRepository
        name: flux-operator
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: false
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    web:
      config:
        authentication:
          type: Anonymous
          anonymous:
            username: flux-admin
            groups:
              - flux-web-basic-auth-admins
        userActions:
          audit:
            - "*"
      networkPolicy:
        create: false
      ingress:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: prod-issuer
          traefik.ingress.kubernetes.io/router.middlewares: flux-system-flux-operator-basic-auth@kubernetescrd
        hosts:
          - host: flux.nishiol.ru
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - flux.nishiol.ru
            secretName: flux-operator-tls
