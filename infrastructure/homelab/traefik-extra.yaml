apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik-extra
  namespace: traefik-extra
spec:
  dependsOn:
    - name: clusterissuer
      namespace: default
  interval: 30m
  releaseName: traefik-extra
  targetNamespace: traefik-extra
  storageNamespace: traefik-extra
  chart:
    spec:
      chart: ./charts/traefik-extra
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    certIssuer: prod-issuer
    dashboardHostName: traefik.nishiol.ru
    existingSecret: traefik-extra-auth
