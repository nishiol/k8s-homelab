apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  dependsOn:
    - name: clusterissuer
      namespace: default
    - name: traefik-extra
      namespace: traefik-extra
  interval: 30m
  releaseName: longhorn
  targetNamespace: longhorn-system
  storageNamespace: longhorn-system
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    ingress:
      enabled: true
      host: longhorn.nishiol.ru
      tls: true
      tlsSecret: longhorn
      annotations:
        cert-manager.io/cluster-issuer: prod-issuer
        traefik.ingress.kubernetes.io/router.middlewares: traefik-extra-basic-auth@kubernetescrd
    longhornUI:
      replicas: 1
    persistence:
      defaultClassReplicaCount: 1
      defaultDataLocality: best-effort
      reclaimPolicy: Delete
      removeSnapshotsDuringFilesystemTrim: enabled
