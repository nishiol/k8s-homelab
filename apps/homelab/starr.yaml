apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: starr
  namespace: starr
spec:
  dependsOn:
    - name: clusterissuer
      namespace: default
    - name: longhorn
      namespace: longhorn-system
    - name: gluetun
      namespace: gluetun
    - name: jackett
      namespace: jackett
  interval: 30m
  releaseName: starr
  targetNamespace: starr
  storageNamespace: starr
  chart:
    spec:
      chart: ./charts/starr
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    qbittorrent:
      hostName: qbittorrent.nishiol.ru
      torrentingPort: 6881
    radarr:
      hostName: radarr.nishiol.ru
    sonarr:
      hostName: sonarr.nishiol.ru
    jellyfin:
      hostName: jellyfin.nishiol.ru
      transcodeCacheSize: 2Gi
    filebrowser:
      hostName: starr.nishiol.ru
    certIssuer: prod-issuer
    mediaSize: 300Gi
    proxyUrl: http://gluetun.gluetun:8080
    noProxy: .svc.cluster.local,localhost,127.0.0.1
    nodeSelector:
      cpu: medium
    additionalVolumes:
      - name: media-raspberrypi4
        persistentVolumeClaim:
          claimName: media-raspberrypi4
    additionalVolumeMounts:
      - name: media-raspberrypi4
        mountPath: /media-raspberrypi4
    additionalFileBrowserVolumeMounts:
      - name: media-raspberrypi4
        mountPath: /srv/media-raspberrypi4
