apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flaresolverr
  namespace: flaresolverr
spec:
  interval: 30m
  releaseName: flaresolverr
  targetNamespace: flaresolverr
  storageNamespace: flaresolverr
  chart:
    spec:
      chart: ./charts/flaresolverr
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    nodeSelector:
      cpu: medium
