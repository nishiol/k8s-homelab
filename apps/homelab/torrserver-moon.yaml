apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: torrserver
  namespace: torrserver-moon
spec:
  dependsOn:
    - name: clusterissuer
      namespace: default
    - name: longhorn
      namespace: longhorn-system
  interval: 30m
  releaseName: torrserver
  targetNamespace: torrserver-moon
  storageNamespace: torrserver-moon
  chart:
    spec:
      chart: ./charts/torrserver
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    existingSecret: torrserver-moon-credentials
    hostName: moon.ts.nishiol.ru
    certIssuer: prod-issuer
    incomingConnectionsPort: 56336
    nodeSelector:
      cpu: slow
