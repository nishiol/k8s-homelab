apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wg-easy
  namespace: wg-easy
spec:
  dependsOn:
    - name: clusterissuer
      namespace: default
    - name: longhorn
      namespace: longhorn-system
  interval: 30m
  releaseName: wg-easy
  targetNamespace: wg-easy
  storageNamespace: wg-easy
  chart:
    spec:
      chart: ./charts/wg-easy
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 10m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    hostName: wg.nishiol.ru
    certIssuer: prod-issuer
    disableIPv6: true
    nodeSelector:
      cpu: slow
